name: Build Kivy APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3 python3-pip python3-setuptools git zip unzip wget \
                            libtool autoconf automake pkg-config libffi-dev \
                            build-essential libssl-dev libsqlite3-dev bzip2 libbz2-dev \
                            liblzma-dev libgdbm-dev libgdbm-compat-dev libreadline-dev \
                            uuid-dev gawk libncurses5-dev libncursesw5-dev \
                            cmake libjpeg-dev zlib1g-dev

    - name: Install buildozer & cython
      run: |
        pip install --upgrade buildozer cython

    # キャッシュを v6 に変更してクリーンな環境を作成
    - name: Cache Buildozer global directory
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: ${{ runner.os }}-buildozer-global-${{ hashFiles('buildozer.spec') }}-v6

    - name: Cache Project Buildozer directory
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: ${{ runner.os }}-buildozer-local-${{ hashFiles('buildozer.spec') }}-v6

    # SDK Command-line Tools の正しい配置 & sdkmanager と旧 tools/bin へのシンボリックリンク作成
    - name: Setup Android SDK and Licenses
      run: |
        SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
        mkdir -p "$SDK_DIR/cmdline-tools"
        cd "$SDK_DIR/cmdline-tools"
        
        # cmdline-tools のダウンロードと解凍 (最新構造: cmdline-tools/latest/bin/sdkmanager)
        if [ ! -d "latest" ]; then
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          rm cmdline-tools.zip
          mv cmdline-tools latest
        fi
        
        # Buildozer が探す旧互換パス (tools/bin/sdkmanager) へのシンボリックリンクを作成
        mkdir -p "$SDK_DIR/tools"
        ln -sf "$SDK_DIR/cmdline-tools/latest/bin" "$SDK_DIR/tools/bin"
        
        # ライセンス一括同意
        yes | "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$SDK_DIR" --licenses || true

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PapaAlbumApp-Debug-APK
        path: bin/*.apk