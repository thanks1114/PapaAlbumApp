name: Build Kivy APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    # ================= [追加] Issueからアイコン画像を自動ダウンロード =================
    - name: Download App Icon from Issue
      run: |
        # ↓ここにIssueに添付されている画像のURL（https://github.com/.../assets/...）を貼り付けてください
        ICON_URL="https://github.com/thanks1114/PapaAlbumApp/issues/1"
        
        # アイコンをダウンロードしてプロジェクトのルートに配置
        wget -q -O icon.png "$ICON_URL"
        echo "Icon downloaded successfully."
    # =================================================================================

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3 python3-pip python3-setuptools git zip unzip wget \
                            libtool autoconf automake pkg-config libffi-dev \
                            build-essential libssl-dev libsqlite3-dev bzip2 libbz2-dev \
                            liblzma-dev libgdbm-dev libgdbm-compat-dev libreadline-dev \
                            uuid-dev gawk libncurses5-dev libncursesw5-dev

    - name: Install buildozer
      run: |
        pip install buildozer cython

    # ================= キャッシュ設定（-v2を追加してplyer未検出バグを修正） =================
    - name: Cache Buildozer global directory
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: ${{ runner.os }}-buildozer-global-${{ hashFiles('buildozer.spec') }}-v2
        restore-keys: |
          ${{ runner.os }}-buildozer-global-

    - name: Cache Project Buildozer directory
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: ${{ runner.os }}-buildozer-local-${{ hashFiles('buildozer.spec') }}-v2
        restore-keys: |
          ${{ runner.os }}-buildozer-local-
    # ========================================================================================

    # --- 古いsdkmanagerのパスエラーを回避するための事前セットアップ ---
    - name: Setup Android SDK and Accept Licenses
      run: |
        SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
        
        if [ -L "$SDK_DIR/tools/bin/sdkmanager" ]; then
          rm -f "$SDK_DIR/tools/bin/sdkmanager"
        fi

        if [ ! -d "$SDK_DIR/cmdline-tools" ]; then
          mkdir -p "$SDK_DIR/cmdline-tools"
          cd "$SDK_DIR/cmdline-tools"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          rm cmdline-tools.zip
          mv cmdline-tools latest
          
          mkdir -p ../tools/bin
          ln -s ../../cmdline-tools/latest/bin/sdkmanager ../tools/bin/sdkmanager
          mkdir -p ../licenses
          echo -e "\n89ab2ddd8d477d506bb51ca248315222b49ff45a\n84831b9409646a918e30573bab4c9c91346d8abd\n504667f4c24de1a812cf475b6eb9d4f4002e7dd9\nd56f5187479451eabf01fb7431b34d65b2d07dd8\ne9ac30531ff8ecc33d115494cae51ffb0fc08cb0\n2714b11687f312cd0266164d4ee4d22970a0d939" > ../licenses/android-sdk-license
          echo -e "\n849ac24de157199418e30573bab4c9c91346d8abd" > ../licenses/android-sdk-preview-license
          yes | ./latest/bin/sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk --licenses
        else
          mkdir -p "$SDK_DIR/tools/bin"
          ln -sf ../../cmdline-tools/latest/bin/sdkmanager "$SDK_DIR/tools/bin/sdkmanager"
        fi

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PapaAlbumApp-Debug-APK
        path: bin/*.apk
