name: Build Kivy APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3 python3-pip python3-setuptools git zip openjdk-11-jdk wget unzip

    - name: Install Android SDK manually (build-tools 33.0.2)
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools

        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O tools.zip
        unzip tools.zip

        # ZIP の中身は cmdline-tools/ なので、それを latest/ に移動
        mv cmdline-tools latest

        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

    - name: Install buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Force Buildozer to use our SDK (overwrite internal SDK)
      run: |
        mkdir -p ~/.buildozer/android/platform/
        rm -rf ~/.buildozer/android/platform/android-sdk
        cp -r $HOME/android-sdk ~/.buildozer/android/platform/android-sdk

    - name: Build APK
      run: |
        buildozer android debug
