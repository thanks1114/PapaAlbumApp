name: Build Kivy APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3 python3-pip python3-setuptools git zip openjdk-17-jdk

    - name: Install buildozer
      run: |
        pip install buildozer cython

    # --- 【重要】ここが修正ポイントです ---
    # Buildozerを実行する前に、Android SDKのライセンスに自動で同意します。
    - name: Accept Android SDK Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        # BuildozerがダウンロードするSDKマネージャーを叩いて自動で「yes」を流し込みます
        yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

    - name: Build APK
      run: |
        buildozer android debug

    # --- 【便利機能】ビルドされたAPKをGitHubからダウンロードできるようにします ---
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PapaAlbumApp-Debug-APK
        path: bin/*.apk
