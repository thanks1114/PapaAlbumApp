name: Build Kivy APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3 python3-pip python3-setuptools git zip unzip wget \
                            libtool autoconf automake pkg-config libffi-dev \
                            build-essential libssl-dev libsqlite3-dev bzip2 libbz2-dev \
                            liblzma-dev libgdbm-dev libgdbm-compat-dev libreadline-dev \
                            uuid-dev gawk libncurses5-dev libncursesw5-dev \
                            cmake libjpeg-dev zlib1g-dev

    - name: Install buildozer & cython
      run: |
        pip install --upgrade buildozer cython

    # キャッシュキー更新（v10）
    - name: Cache Buildozer global directory
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: ${{ runner.os }}-buildozer-global-${{ hashFiles('buildozer.spec') }}-v10

    - name: Cache Project Buildozer directory
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: ${{ runner.os }}-buildozer-local-${{ hashFiles('buildozer.spec') }}-v10

    # Android Command-line Tools (sdkmanager) の手動事前配置
    - name: Setup Android Command-line Tools
      run: |
        ANDROID_SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
        mkdir -p "$ANDROID_SDK_DIR/cmdline-tools"
        if [ ! -d "$ANDROID_SDK_DIR/cmdline-tools/latest" ]; then
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d "$ANDROID_SDK_DIR/cmdline-tools"
          mv "$ANDROID_SDK_DIR/cmdline-tools/cmdline-tools" "$ANDROID_SDK_DIR/cmdline-tools/latest"
          rm cmdline-tools.zip
        fi
        
        # Buildozer(旧構造参照)用のシンボリックリンク作成
        mkdir -p "$ANDROID_SDK_DIR/tools"
        ln -sf "$ANDROID_SDK_DIR/cmdline-tools/latest/bin" "$ANDROID_SDK_DIR/tools/bin"

        # ライセンスの一括自動承諾
        yes | "$ANDROID_SDK_DIR/cmdline-tools/latest/bin/sdkmanager" --licenses || true

    # ビルド実行
    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PapaAlbumApp-Debug-APK
        path: bin/*.apk