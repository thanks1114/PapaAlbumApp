name: Build Kivy APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3 python3-pip python3-setuptools git zip openjdk-17-jdk

    - name: Install buildozer
      run: |
        pip install buildozer cython

    - name: Build APK
      run: |
        buildozer android debug
